// 오디오
let AC=null;
let bgNode=null, bgGain=null;

function beep(f,d,t='sine',v=0.12){
  try{
    if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();
    const o=AC.createOscillator(),g=AC.createGain(),n=AC.currentTime;
    o.connect(g);g.connect(AC.destination);
    o.type=t;o.frequency.setValueAtTime(f,n);
    g.gain.setValueAtTime(v,n);g.gain.exponentialRampToValueAtTime(0.001,n+d);
    o.start(n);o.stop(n+d+0.05);
  }catch(e){}
}

// 배경음 (8비트 멜로디 루프)
function startBGM(){
  try{
    if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();
    stopBGM();
    const notes=[
      523,659,784,1047, 880,784,659,523,
      587,740,880,1175, 988,880,740,587
    ];
    const dur=0.18;
    let i=0;
    function playNote(){
      if(!bgGain)return;
      const o=AC.createOscillator();
      const g=AC.createGain();
      o.connect(g);g.connect(bgGain);
      o.type='square';
      o.frequency.value=notes[i%notes.length];
      const t=AC.currentTime;
      g.gain.setValueAtTime(0.08,t);
      g.gain.exponentialRampToValueAtTime(0.001,t+dur*0.85);
      o.start(t);o.stop(t+dur);
      i++;
      bgTimer=setTimeout(playNote,dur*1000);
    }
    bgGain=AC.createGain();
    bgGain.gain.value=1;
    bgGain.connect(AC.destination);
    playNote();
  }catch(e){}
}

function stopBGM(){
  if(bgTimer){clearTimeout(bgTimer);bgTimer=null;}
  if(bgGain){bgGain.disconnect();bgGain=null;}
}

let bgTimer=null;

// 게임오버 효과음 (내려가는 멜로디)
function playGameOver(){
  const seq=[[440,0.15],[370,0.15],[311,0.15],[262,0.4]];
  let t=0;
  seq.forEach(([f,d])=>{
    setTimeout(()=>beep(f,d,'sawtooth',0.18),t*1000);
    t+=d;
  });
}

// 플레이어
const P={
  y:0,vy:0,onGround:true,jumps:0,inv:0,dead:false,drot:0,legT:0,
  init(){this.y=GY-PH;this.vy=0;this.onGround=true;this.jumps=0;this.inv=0;this.dead=false;this.drot=0;this.legT=0;},
  jump(){
    if(this.dead||this.jumps>=2)return;
    this.vy=this.jumps===0?J1:J2;
    this.onGround=false;this.jumps++;
    beep(this.jumps===1?420:600,0.1);
    spawnFX(PX+PW/2,this.y+PH,'#ffe4cc',4);
  },
  update(dt=1){
    if(this.dead){this.vy+=0.45*dt;this.y+=this.vy*dt;this.drot+=0.1*dt;return;}
    this.vy+=GRAV*dt;this.y+=this.vy*dt;
    this.legT+=this.onGround?0.22*dt:0.05*dt;
    if(this.inv>0)this.inv-=dt;
  },
  draw(){
    if(this.inv>0&&Math.floor(this.inv/4)%2===1)return;
    const bob=this.onGround?Math.abs(Math.sin(this.legT))*2.5:0;
    ctx.save();ctx.translate(PX+PW/2,this.y+PH/2+bob);
    if(this.dead)ctx.rotate(this.drot);
    if(IMG.complete&&IMG.naturalWidth>0)ctx.drawImage(IMG,-PW/2,-PH/2,PW,PH);
    else{ctx.fillStyle='#f0e8d8';ctx.beginPath();ctx.ellipse(0,0,20,22,0,0,Math.PI*2);ctx.fill();}
    ctx.restore();
  }
};

let tiles=[], obs=[], coins=[], rocks=[];

// 타일 오른쪽 끝 (항상 화면좌표 기준)
function rightEdge(){ return tiles.reduce((m,t)=>Math.max(m,t.x+t.w), 0); }

// 청크 생성 - rx = 현재 타일 오른쪽 끝
function genChunk(){
  const rx=rightEdge();
  chunksDone++;

  // 안전구간: 처음 5개 청크는 평지만
  if(chunksDone<=5){
    tiles.push({x:rx,y:GY,w:100,h:80,plat:false});
    return;
  }

  const r=Math.random();

  if(r<0.28){
    // 평지 + 선인장
    const w=150+Math.random()*60;
    tiles.push({x:rx,y:GY,w,h:80,plat:false});
    coins.push({x:rx+25,y:GY-55,done:false});
    obs.push({kind:'cac',x:rx+w*0.6,y:GY,alive:true,t:0,rt:0,riv:0});

  }else if(r<0.52){
    // 평지 + 두더지
    const w=160+Math.random()*50;
    tiles.push({x:rx,y:GY,w,h:80,plat:false});
    coins.push({x:rx+25,y:GY-55,done:false});
    obs.push({kind:'mole',x:rx+w*0.65,y:GY,alive:true,t:0,rt:80,riv:140});

  }else if(r<0.68){
    // 구멍 (100px) - 더블점프로 건널 수 있는 크기
    tiles.push({x:rx,     y:GY,w:100,h:80,plat:false}); // 앞 땅
    // rx+100 ~ rx+200 : 100px 구멍
    tiles.push({x:rx+200, y:GY,w:110,h:80,plat:false}); // 뒤 땅
    coins.push({x:rx+50,y:GY-55,done:false});

  }else if(r<0.82){
    // 구멍(100px) + 공중 플랫폼
    tiles.push({x:rx,     y:GY,   w:80, h:80,plat:false}); // 앞 땅
    // rx+80 ~ rx+180 : 100px 구멍
    tiles.push({x:rx+90,  y:GY-90,w:80, h:16,plat:true});  // 플랫폼 (구멍 위)
    tiles.push({x:rx+180, y:GY,   w:90, h:80,plat:false}); // 뒤 땅
    coins.push({x:rx+130,y:GY-130,done:false});

  }else{
    // 계단
    tiles.push({x:rx,y:GY,w:270,h:80,plat:false});
    tiles.push({x:rx+60,y:GY-75,w:80,h:16,plat:true});
    coins.push({x:rx+100,y:GY-112,done:false});
    tiles.push({x:rx+160,y:GY-145,w:80,h:16,plat:true});
    coins.push({x:rx+200,y:GY-182,done:false});
  }
}

function initGame(){
  tiles=[];obs=[];coins=[];rocks=[];fxArr=[];ftArr=[];
  frame=0;score=0;spd=1.5;chunksDone=0;lives=3;combo=0;comboTimer=0;
  P.init();
  // 초기 청크 생성 (화면 6배치 앞까지)
  while(rightEdge()<W*6) genChunk();
}

function gameUpdate(dt){
  if(frame%180===0&&spd<4.0)spd+=0.1;

  tiles.forEach(t=>t.x-=spd*dt);
  obs.forEach(o=>{
    o.x-=spd*dt;o.t+=0.1*dt;
    if(o.kind==='mole'&&o.alive){
      o.rt+=dt;
      if(o.rt>=o.riv){
        o.rt=0;
        rocks.push({x:o.x-15,y:o.y-30,vx:-2.5-spd*0.2,vy:-5.5,alive:true});
        beep(280,0.08,'square',0.07);
      }
    }
  });
  coins.forEach(c=>c.x-=spd*dt);
  rocks.forEach(r=>{
    r.x+=r.vx*dt;r.y+=r.vy*dt;r.vy+=0.42*dt;
    if(r.y>GY-8){r.vy*=-0.38;r.y=GY-8;r.vx*=0.72;}
    if(Math.abs(r.vy)<0.7&&r.y>=GY-10)r.alive=false;
  });

  tiles=tiles.filter(t=>t.x+t.w>-10);
  obs=obs.filter(o=>o.alive&&o.x>-80);
  coins=coins.filter(c=>!c.done&&c.x>-20);
  rocks=rocks.filter(r=>r.alive&&r.x>-20&&r.x<W+20);
  fxArr=fxArr.filter(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=0.12*dt;p.life-=dt;return p.life>0;});
  ftArr=ftArr.filter(f=>{f.y+=f.vy*dt;f.life-=dt;return f.life>0;});

  // 새 청크: 오른쪽 끝이 W*5 미만이면 생성
  while(rightEdge()<W*5) genChunk();

  P.update();

  // 타일 충돌
  P.onGround=false;
  for(const t of tiles){
    if(PX+PW<=t.x||PX>=t.x+t.w)continue;  // 좌우 범위 밖
    if(P.y+PH<=t.y)continue;                 // 타일 위에 있음
    if(P.y>=t.y+t.h)continue;                // 타일 아래에 있음 (플랫폼만 해당)
    const prevB=P.y+PH-P.vy;
    if(prevB<=t.y+12&&P.vy>=0){P.y=t.y-PH;P.vy=0;P.onGround=true;P.jumps=0;}
  }

  if(P.y>H+60&&!P.dead){
    if(lives>1){
      lives--;combo=0;comboTimer=0;
      beep(200,0.2,'sawtooth',0.15);
      // 페케 리스폰
      P.y=GY-PH;P.vy=0;P.onGround=true;P.jumps=0;P.inv=120;
      spawnFT(PX+PW/2,GY-80,'💔','#ff6666');
    }else{
      die();
    }
  }

  // 콤보 타이머
  if(comboTimer>0){comboTimer-=dt;if(comboTimer<=0){comboTimer=0;combo=0;}}

  // 장애물 충돌
  obs.forEach(o=>{
    if(!o.alive)return;
    if(o.kind==='cac'){
      if(PX+PW-6<o.x-10||PX+6>o.x+10)return;
      if(P.y+PH-6<o.y-48||P.y>o.y)return;
      if(P.inv===0)hit();
    }else{
      const mTop=o.y-36;
      if(PX+PW-4<o.x-16||PX+4>o.x+16)return;
      if(P.y+PH<mTop||P.y>o.y)return;
      const prevB=P.y+PH-P.vy;
      if(P.vy>0&&prevB<=mTop+14){
        o.alive=false;P.vy=-10;
        combo++;comboTimer=180;
        const pts=combo>=3?60:combo>=2?45:30;
        score+=pts;
        beep(700,0.08);setTimeout(()=>beep(1000,0.08),100);
        spawnFX(o.x,o.y-20,'#c8814a',10);
        const txt=combo>=3?`🔥 ${pts}!`:combo>=2?`x${combo} ${pts}!`:`+${pts}`;
        spawnFT(o.x,o.y-30,txt,'#ffc88a');
      }else if(P.inv===0)hit();
    }
  });

  // 돌 충돌
  rocks.forEach(r=>{
    if(!r.alive)return;
    if(PX+PW-4<r.x-10||PX+4>r.x+10)return;
    if(P.y+PH-4<r.y-10||P.y+4>r.y+10)return;
    if(P.inv===0){r.alive=false;hit();}
  });

  // 코인 (+10)
  coins.forEach(c=>{
    if(c.done)return;
    if(Math.hypot(PX+PW/2-c.x,P.y+PH/2-c.y)<26){
      c.done=true;score+=10;beep(880,0.07);
      spawnFX(c.x,c.y,'#ffe44d',4);spawnFT(c.x,c.y-14,'+10','#ffe44d');
    }
  });
}

function hit(){
  if(P.inv>0)return;
  lives--;
  combo=0; comboTimer=0;
  P.inv=120; P.vy=-7;
  beep(200,0.2,'sawtooth',0.15);
  spawnFX(PX+PW/2,P.y+PH/2,'#ff8866',8);
  spawnFT(PX+PW/2,P.y-10,'💔','#ff6666');
  if(lives<=0) die();
}
function die(){
  if(P.dead)return;
  P.dead=true;P.vy=-11;
  stopBGM();
  playGameOver();
  if(score>best)best=score;
  setTimeout(()=>STATE='over',1800);
}
function spawnFX(x,y,col,n){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,sp=1.5+Math.random()*3.5;fxArr.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1.5,life:20,max:20,col,sz:3+Math.random()*3});}}
function spawnFT(x,y,txt,col){ftArr.push({x,y,txt,col,life:40,vy:-1.1});}

// 배경
const STARS=Array.from({length:80},()=>({x:Math.random()*W,y:Math.random()*H*0.6,r:Math.random()*1.5+0.3,b:Math.random()*Math.PI*2,sp:0.08+Math.random()*0.18}));
const CLOUDS=Array.from({length:7},()=>({x:Math.random()*W,y:20+Math.random()*90,s:0.55+Math.random()*0.5,sp:0.14+Math.random()*0.2}));
const HILLS=Array.from({length:9},()=>({x:Math.random()*W,w:130+Math.random()*100,h:60+Math.random()*70,sp:0.3+Math.random()*0.22}));

function drawBG(){
  const sky=ctx.createLinearGradient(0,0,0,H);sky.addColorStop(0,'#060114');sky.addColorStop(0.55,'#140730');sky.addColorStop(1,'#220d48');
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);
  STARS.forEach(s=>{
    if(STATE==='play'){s.x-=s.sp;if(s.x<-2)s.x=W+2;}
    const tw=0.4+0.6*Math.sin(s.b+frame*0.02);
    ctx.fillStyle=`rgba(255,240,200,${tw})`;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();
  });
  ctx.save();ctx.shadowColor='#fff5e0';ctx.shadowBlur=26;
  ctx.fillStyle='#fff8ee';ctx.beginPath();ctx.arc(W-65,50,28,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#ece0cc';ctx.beginPath();ctx.arc(W-56,43,20,0,Math.PI*2);ctx.fill();
  ctx.restore();
  HILLS.forEach(m=>{
    if(STATE==='play'){m.x-=m.sp;if(m.x+m.w<-5)m.x=W+55;}
    const g=ctx.createLinearGradient(m.x,GY-m.h,m.x,GY);g.addColorStop(0,'rgba(80,48,18,0.72)');g.addColorStop(1,'rgba(48,26,6,0.82)');
    ctx.fillStyle=g;ctx.beginPath();ctx.moveTo(m.x,GY);
    ctx.bezierCurveTo(m.x+m.w*0.25,GY-m.h*0.72,m.x+m.w*0.4,GY-m.h,m.x+m.w/2,GY-m.h);
    ctx.bezierCurveTo(m.x+m.w*0.6,GY-m.h,m.x+m.w*0.75,GY-m.h*0.72,m.x+m.w,GY);ctx.closePath();ctx.fill();
  });
  CLOUDS.forEach(cl=>{
    if(STATE==='play'){cl.x-=cl.sp;if(cl.x+160*cl.s<-5)cl.x=W+85;}
    ctx.save();ctx.translate(cl.x,cl.y);ctx.scale(cl.s,cl.s);ctx.fillStyle='rgba(255,240,200,0.11)';
    [[0,0,26],[26,-7,20],[52,0,24],[76,3,18],[-18,4,16]].forEach(([bx,by,r])=>{ctx.beginPath();ctx.arc(bx,by,r,0,Math.PI*2);ctx.fill();});
    ctx.restore();
  });
}

function drawTile(t){
  const{x,y,w,h,plat}=t;if(x>W+5||x+w<-5)return;
  if(plat){
    const g=ctx.createLinearGradient(x,y,x,y+h);g.addColorStop(0,'#b08850');g.addColorStop(1,'#785030');
    ctx.fillStyle=g;ctx.beginPath();ctx.roundRect(x,y,w,h,5);ctx.fill();
    ctx.fillStyle='rgba(255,220,150,0.22)';ctx.fillRect(x+4,y+3,w-8,4);
    ctx.strokeStyle='#906840';ctx.lineWidth=1.5;ctx.beginPath();ctx.roundRect(x,y,w,h,5);ctx.stroke();
  }else{
    const g=ctx.createLinearGradient(x,y,x,y+h);g.addColorStop(0,'#c8914a');g.addColorStop(0.12,'#b07838');g.addColorStop(1,'#7a4e20');
    ctx.fillStyle=g;ctx.fillRect(x,y,w,h);ctx.fillStyle='#e8a850';ctx.fillRect(x,y,w,6);ctx.fillStyle='#f5c068';ctx.fillRect(x,y+1,w,2);
  }
}

function drawCac(o){
  if(!o.alive||o.x<-25||o.x>W+25)return;
  ctx.save();ctx.translate(o.x,o.y);

  // 그림자
  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.beginPath();ctx.ellipse(0,2,14,5,0,0,Math.PI*2);ctx.fill();

  // 몸통 측면 (3D 어두운 면)
  ctx.fillStyle='#1a5e1a';
  ctx.fillRect(-11,-52,5,52);

  // 몸통 정면 (밝은 면)
  const bodyGrad=ctx.createLinearGradient(-11,-52,11,-52);
  bodyGrad.addColorStop(0,'#1a5e1a');
  bodyGrad.addColorStop(0.3,'#3a9e3a');
  bodyGrad.addColorStop(0.7,'#2e8e2e');
  bodyGrad.addColorStop(1,'#1a5e1a');
  ctx.fillStyle=bodyGrad;
  ctx.fillRect(-11,-52,22,52);

  // 왼쪽 팔
  const armL=ctx.createLinearGradient(-23,-35,-9,-35);
  armL.addColorStop(0,'#1a5e1a');armL.addColorStop(0.5,'#3a9e3a');armL.addColorStop(1,'#2e8e2e');
  ctx.fillStyle=armL;
  ctx.fillRect(-23,-38,14,10);
  ctx.fillRect(-23,-38,10,20);
  // 팔 윗면
  ctx.fillStyle='#5abe5a';
  ctx.fillRect(-23,-38,14,3);
  ctx.fillRect(-23,-38,10,3);

  // 오른쪽 팔
  const armR=ctx.createLinearGradient(9,-30,23,-30);
  armR.addColorStop(0,'#2e8e2e');armR.addColorStop(0.5,'#3a9e3a');armR.addColorStop(1,'#1a5e1a');
  ctx.fillStyle=armR;
  ctx.fillRect(10,-28,13,10);
  ctx.fillRect(12,-28,9,20);
  // 팔 윗면
  ctx.fillStyle='#5abe5a';
  ctx.fillRect(10,-28,13,3);

  // 몸통 윗면 (밝게)
  ctx.fillStyle='#5abe5a';
  ctx.fillRect(-11,-52,22,4);

  // 가시
  ctx.fillStyle='#c8e870';
  [[-11,-54],[8,-54],[-11,-30],[9,-24],[-23,-36],[7,-26]].forEach(([gx,gy])=>{
    ctx.beginPath();ctx.moveTo(gx,gy);ctx.lineTo(gx-2,gy-5);ctx.lineTo(gx+2,gy-5);ctx.closePath();ctx.fill();
  });

  // 하이라이트
  ctx.fillStyle='rgba(200,255,200,0.15)';
  ctx.fillRect(-7,-50,4,48);

  ctx.restore();
}

function drawMole(o){
  if(!o.alive||o.x<-40||o.x>W+40)return;
  const bob=Math.sin(o.t)*4;
  ctx.save();ctx.translate(o.x,o.y+bob);
  ctx.fillStyle='#1a0a00';ctx.beginPath();ctx.ellipse(0,2,20,9,0,0,Math.PI*2);ctx.fill();
  const g=ctx.createRadialGradient(-3,-20,2,0,-18,16);g.addColorStop(0,'#d4956a');g.addColorStop(0.6,'#a0522d');g.addColorStop(1,'#6b3010');
  ctx.fillStyle=g;ctx.beginPath();ctx.ellipse(0,-18,15,18,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#ff9988';ctx.beginPath();ctx.ellipse(-12,-18,5,4,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#111';ctx.beginPath();ctx.arc(-5,-24,3.5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(-4,-25,1.4,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.fillRect(-6,-13,5,5);ctx.fillRect(1,-13,5,5);
  ctx.restore();
}

function drawRock(r){
  if(!r.alive)return;
  ctx.save();ctx.translate(r.x,r.y);
  const g=ctx.createRadialGradient(-2,-2,1,0,0,9);g.addColorStop(0,'#ccc');g.addColorStop(0.6,'#888');g.addColorStop(1,'#555');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(0,0,9,0,Math.PI*2);ctx.fill();ctx.restore();
}

function drawCoin(c){
  if(c.done||c.x<-15||c.x>W+15)return;
  const bob=Math.sin(frame*0.1+c.x*0.05)*4;
  ctx.save();ctx.translate(c.x,c.y+bob);ctx.shadowColor='#ffe44d';ctx.shadowBlur=12;
  const g=ctx.createRadialGradient(-2,-2,1,0,0,10);g.addColorStop(0,'#fffde7');g.addColorStop(0.5,'#ffe44d');g.addColorStop(1,'#e67e00');
  ctx.fillStyle=g;ctx.beginPath();ctx.arc(0,0,10,0,Math.PI*2);ctx.fill();ctx.restore();
}

function drawHUD(){
  ctx.save();
  // 점수
  ctx.fillStyle='rgba(0,0,0,0.45)';ctx.beginPath();ctx.roundRect(8,8,162,38,10);ctx.fill();
  ctx.fillStyle='#fff';ctx.font='bold 20px Arial';ctx.shadowColor='#ffe44d';ctx.shadowBlur=6;ctx.fillText('⭐ '+score,16,33);ctx.shadowBlur=0;
  ctx.fillStyle='#ffd88a';ctx.font='13px Arial';ctx.fillText('최고:'+best,118,31);

  // 목숨 하트
  ctx.font='22px Arial';
  for(let i=0;i<3;i++){
    ctx.globalAlpha=i<lives?1.0:0.25;
    ctx.fillText('❤️',W-44-i*30,38);
  }
  ctx.globalAlpha=1;

  // 콤보
  if(combo>=2){
    ctx.fillStyle='rgba(0,0,0,0.4)';ctx.beginPath();ctx.roundRect(W/2-45,8,90,28,8);ctx.fill();
    ctx.fillStyle='#ff9944';ctx.font='bold 15px Arial';ctx.textAlign='center';
    ctx.fillText(`🔥 ${combo} 콤보!`,W/2,28);ctx.textAlign='left';
  }

  // 점프 게이지
  ctx.fillStyle='rgba(0,0,0,0.38)';ctx.beginPath();ctx.roundRect(8,50,52,22,7);ctx.fill();
  for(let i=0;i<2;i++){
    ctx.fillStyle=P.jumps>i?'rgba(140,90,30,0.5)':'#ffd88a';
    ctx.beginPath();ctx.arc(18+i*22,61,8,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#333';ctx.font='bold 10px Arial';ctx.textAlign='center';
    ctx.fillText('↑',18+i*22,65);ctx.textAlign='left';
  }
  ctx.restore();
}

let iX=-60,iLeg=0;
function drawIntro(){
  iX+=1.6;if(iX>W+60)iX=-60;iLeg+=0.2;drawBG();
  ctx.fillStyle='#7a4e20';ctx.fillRect(0,GY,W,H-GY);ctx.fillStyle='#c8914a';ctx.fillRect(0,GY,W,7);
  for(let i=60;i<W;i+=90)drawCac({alive:true,x:i,y:GY});
  const bob=Math.abs(Math.sin(iLeg*0.8))*3;
  ctx.save();ctx.translate(iX+PW/2,GY-PH/2+bob);
  if(IMG.complete&&IMG.naturalWidth>0)ctx.drawImage(IMG,-PW/2,-PH/2,PW,PH);
  ctx.restore();
  ctx.save();ctx.fillStyle='rgba(0,0,0,0.62)';ctx.beginPath();ctx.roundRect(W/2-148,90,296,152,18);ctx.fill();
  ctx.shadowColor='#ffe44d';ctx.shadowBlur=14;ctx.fillStyle='#fff';ctx.font='bold 26px Arial';ctx.textAlign='center';
  ctx.fillText('🦊 페케 폭스의 모험',W/2,132);ctx.shadowBlur=0;
  ctx.fillStyle='#ffd88a';ctx.font='14px Arial';
  ctx.fillText('🌵 선인장 → 점프로 피하기',W/2,162);
  ctx.fillText('🐭 두더지 → 머리 밟아서 처치! +30',W/2,184);
  ctx.fillText('🪨 날아오는 돌 → 점프로 피하기',W/2,206);
  ctx.fillStyle=Math.sin(frame*0.1)>0?'#ffe44d':'#fff';ctx.font='bold 15px Arial';
  ctx.fillText('✨ 화면 탭 / 스페이스 = 시작!',W/2,232);ctx.textAlign='left';ctx.restore();
}

function drawOver(){
  drawBG();ctx.fillStyle='rgba(3,1,10,0.9)';ctx.fillRect(0,0,W,H);
  ctx.save();ctx.fillStyle='rgba(0,0,0,0.5)';ctx.beginPath();ctx.roundRect(W/2-145,H/2-100,290,192,20);ctx.fill();
  ctx.shadowColor='#ffe44d';ctx.shadowBlur=12;ctx.fillStyle='#fff';ctx.font='bold 23px Arial';ctx.textAlign='center';
  ctx.fillText('🦊 페케가 넘어졌어요!',W/2,H/2-65);ctx.shadowBlur=0;
  ctx.fillStyle='#ffd88a';ctx.font='bold 22px Arial';ctx.fillText('점수: '+score,W/2,H/2-28);
  ctx.fillStyle='#d4b88a';ctx.font='16px Arial';ctx.fillText('최고 기록: '+best,W/2,H/2+2);
  ctx.fillStyle=Math.sin(frame*0.1)>0?'#ffe44d':'#fff';ctx.font='bold 15px Arial';
  ctx.fillText('탭 / 스페이스로 다시!',W/2,H/2+50);ctx.textAlign='left';ctx.restore();
}

let lastTime=0;
function loop(ts){
  requestAnimationFrame(loop);
  const dt=Math.min((ts-lastTime)/16.667, 2.5); // 60fps 기준, 최대 2.5배
  lastTime=ts;
  ctx.clearRect(0,0,W,H);frame++;
  if(STATE==='intro'){drawIntro();return;}
  if(STATE==='over'){drawOver();return;}
  if(!P.dead)gameUpdate(dt);else P.update(dt);
  drawBG();
  ctx.fillStyle='#030110';ctx.fillRect(0,GY,W,H-GY);
  tiles.forEach(t=>drawTile(t));
  coins.forEach(c=>drawCoin(c));
  obs.forEach(o=>{if(o.kind==='cac')drawCac(o);else drawMole(o);});
  rocks.forEach(r=>drawRock(r));
  P.draw();
  fxArr.forEach(p=>{ctx.globalAlpha=p.life/p.max;ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.sz,0,Math.PI*2);ctx.fill();});
  ctx.globalAlpha=1;
  ftArr.forEach(f=>{ctx.globalAlpha=f.life/40;ctx.fillStyle=f.col;ctx.font='bold 14px Arial';ctx.textAlign='center';ctx.fillText(f.txt,f.x,f.y);ctx.textAlign='left';});
  ctx.globalAlpha=1;
  drawHUD();
  if(frame<150){
    ctx.fillStyle=`rgba(255,220,150,${1-frame/150})`;ctx.font='13px Arial';ctx.textAlign='center';
    ctx.fillText('탭/스페이스 = 점프!  더블점프 가능!',W/2,H-18);ctx.textAlign='left';
  }
}

function go(){
  if(STATE!=='play'){
    STATE='play';initGame();
    lastTime=performance.now();
    startBGM();
    return;
  }
  P.jump();
}
document.addEventListener('keydown',e=>{if(e.code==='Space'||e.code==='ArrowUp'){e.preventDefault();go();}});
CV.addEventListener('pointerdown',e=>{e.preventDefault();go();});
requestAnimationFrame(loop);
</script>
</body>
</html>
